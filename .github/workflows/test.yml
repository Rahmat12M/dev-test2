name: Run yest Tests for "dev-test2"

on:
  push:
    branches:
      - test-action
  pull_request:
    branches:
      - test-action

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 20

      - name: Install dependencies
        run: npm i
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend
